<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAHADAT</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* বেসিক রিসেট */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body {
            background-color: #03030c; /* আপনার আগের ডার্ক কালার */
            background-image: radial-gradient(circle at top right, #111e30, transparent 40%),
                              radial-gradient(circle at bottom left, #0d1b2a, transparent 40%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ক্যানভাস (পার্টিকেল ব্যাকগ্রাউন্ড) */
        #webgl {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none; /* যাতে বাটনে ক্লিক করা যায় */
        }

        /* নেভিগেশন বার */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
        }
        .logo { font-weight: bold; font-size: 1.2rem; color: #00e5ff; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 0.9rem; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .login-btn { border: 1px solid #00e5ff; padding: 5px 15px; border-radius: 20px; color: #00e5ff; text-decoration: none; font-size: 0.9rem; }

        /* মূল কন্টেন্ট */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 20px; }
        .explore-btn { background: #00e5ff; color: #000; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- পার্টিকেল ক্যানভাস -->
    <canvas id="webgl"></canvas>

    <header>
        <div class="logo">SHAHADAT</div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="nav-right">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="login-btn">Login</a>
        </div>
    </header>

    <main>
        <h1>Welcome to my website</h1>
        <p>I create modern, responsive, and aesthetically pleasing websites for your business needs.</p>
        <a href="#" class="explore-btn">Explore Services</a>
    </main>

    <!-- পার্টিকেল স্ক্রিপ্ট -->
    <script>
        const canvas = document.getElementById("webgl");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particlesArray = [];
        
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = '#00e5ff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        function init() {
            for(let i=0; i<100; i++) particlesArray.push(new Particle());
        }
        function animate() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            particlesArray.forEach((p, index) => {
                p.update();
                p.draw();
                if (p.size <= 0.2) { particlesArray.splice(index, 1); particlesArray.push(new Particle()); }
            });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
