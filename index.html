        /* =========================================
           GLOBAL RESET & CSS VARIABLES
           ========================================= */
        :root {
            --primary-color: #00e5ff;
            --bg-color: #03030c;
            --text-main: #ffffff;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            scroll-behavior: smooth;
        }

        /* html-এ ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট দেওয়া হলো */
        html {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top right, #111e30, transparent 40%),
                radial-gradient(circle at bottom left, #0d1b2a, transparent 40%);
            min-height: 100vh;
        }

        /* body-কে ট্রান্সপারেন্ট করা হলো যেন পার্টিকেলগুলো দেখা যায় */
        body {
            background-color: transparent; 
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           CANVAS (NANO PARTICLES BACKGROUND)

            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

        header {

            top: 0;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(3, 3, 12, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s ease;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--primary-color);
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
        }

        /* =========================================
           HERO SECTION
           ========================================= */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-section p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
            margin-bottom: 35px;
            max-width: 600px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            color: var(--primary-color);
            text-decoration: none;
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            background: transparent;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--primary-color);
            color: #03030c;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
            transform: translateY(-2px);
        }

        /* =========================================
           FOOTER
           ========================================= */
        footer {
            text-align: center;
            padding: 30px 20px;
            background: rgba(2, 2, 8, 0.8);
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .social-links a {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.3rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* =========================================
           RESPONSIVE DESIGN
           ========================================= */
        @media (max-width: 768px) {
            header {

                gap: 15px;

                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero-section h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <!-- =========================================
         JAVASCRIPT FOR NANO PARTICLES
         ========================================= -->
    <script>
        const canvas = document.getElementById("webgl");
        const ctx = canvas.getContext("2d");
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        let mouse = {
            x: null,
            y: null,
            radius: 120
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00e5ff'; // Cyan neon color
                ctx.fill();
            }

            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Mouse interactivity
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 2;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 2;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 2;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 2;
                    }
                }
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            // Adjust particle density based on screen size
            let numberOfParticles = (canvas.height * canvas.width) / 10000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1.5) - 0.75;
                let directionY = (Math.random() * 1.5) - 0.75;

                particlesArray.push(new Particle(x, y, directionX, directionY, size, '#00e5ff'));
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = dx * dx + dy * dy;
                    
                    if (distance < 12000) {
                        opacityValue = 1 - (distance / 12000);
                        ctx.strokeStyle = 'rgba(0, 229, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        window.addEventListener('resize', function() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        init();
        animate();
    </script>
</body>
</html>
